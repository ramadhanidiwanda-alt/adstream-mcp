services:
  cuan-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: cuan-mcp
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /data/uploads:/data/uploads:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    command: ["node", "mcp-server/dist/http.js"]
