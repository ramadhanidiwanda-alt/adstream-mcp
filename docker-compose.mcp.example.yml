# Copy .env.example to .env, then edit values before starting.
# Never commit .env.
# Remote mode requires CUAN_INSIGHT_* environment variables.
# Local legacy mode requires META_* environment variables if still used.
services:
  meta-ads-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    env_file:
      - .env
    restart: unless-stopped
    command: node dist/mcp/index.js

  # Optional self-hosted HTTP skeleton. Keep disabled unless you need URL access.
  # This uses POST /mcp and GET /health, but fails fast for MCP messages until
  # the current MCP SDK version supports official Streamable HTTP transport.
  # Protect public deployments with HTTPS + reverse proxy + MCP_HTTP_BEARER_TOKEN.
  meta-ads-mcp-http:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    env_file:
      - .env
    environment:
      MCP_HTTP_ENABLED: "true"
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8787"
      MCP_HTTP_PATH: "/mcp"
    ports:
      - "127.0.0.1:8787:8787"
    restart: unless-stopped
    command: node dist/mcp/http.js
    profiles:
      - http
